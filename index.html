<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sarx — Free Health Index Calculator | BMI, TDEE &amp; Body Fat</title>
  <link rel="canonical" href="https://sarx.app/">
  <meta name="description" content="Calculate your BMI, TDEE, and body fat percentage for free. Sarx gives you a personalized health index — no account required.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"></noscript>
  <link rel="preload" as="image" href="assets/logo.png">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="apple-touch-icon" href="assets/icon.jpg">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:title" content="Sarx — Know your body.">
  <meta property="og:description" content="Calculate your BMI, TDEE, and body fat for free. Your personalized health index — no account required.">
  <meta property="og:image" content="https://sarx.app/assets/socialImage.png">
  <meta property="og:url" content="https://sarx.app/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Sarx",
    "url": "https://sarx.app",
    "description": "Evidence-based wellness hub for calculating BMI, TDEE, body fat percentage, and personalized nutrition planning."
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Sarx",
    "url": "https://sarx.app",
    "description": "A free wellness web app that calculates BMI, TDEE, BMR, and body fat percentage from your baseline metrics. Includes personalized calorie and macro planning, and an evidence-ranked wellness library.",
    "applicationCategory": "HealthApplication",
    "operatingSystem": "Any",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "featureList": ["BMI calculator", "TDEE calculator", "BMR calculator", "Body fat percentage estimator", "Calorie goal planner", "Macro breakdown", "Evidence-ranked wellness guides"],
    "screenshot": "https://sarx.app/assets/socialImage.png"
  }
  </script>
</head>
<body>
<div class="app">
  <div class="screen active" id="screen-form">
    <img class="logo-img" src="assets/logo.png" alt="Sarx">
    <div class="intro-block">
      <p class="section-tag">INTRO</p>
      <h1 class="intro-title">Health Index Calculator</h1>
      <p class="intro-desc">To generate your curated health index, we require your baseline metrics. These values are used only to calculate your statistics, and are never saved.</p>
    </div>
    <div class="form-body">
      <div class="field-group">
        <label class="field-label">SEX</label>
        <div class="seg-row">
          <button class="seg-btn" data-sex="male" onclick="selectSex(this,'male')">Male</button>
          <button class="seg-btn" data-sex="female" onclick="selectSex(this,'female')">Female</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">CURRENT AGE</label>
        <div class="input-row">
          <input class="field-input age" type="number" inputmode="decimal" placeholder="28">
          <span class="input-unit">YRS</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">BODY MASS</label>
        <div class="input-row">
          <input class="field-input bodyWeight" type="number" inputmode="decimal" placeholder="185">
          <span class="input-unit">LBS</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">HEIGHT</label>
        <div class="height-row">
          <div class="input-row">
            <input class="field-input heightFt" type="number" inputmode="decimal" placeholder="5" min="0">
            <span class="input-unit">FT</span>
          </div>
          <div class="input-row">
            <input class="field-input heightIn" type="number" inputmode="decimal" placeholder="10" min="0" max="11">
            <span class="input-unit">IN</span>
          </div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">METABOLIC ACTIVITY SCALE</label>
        <div class="select-row">
          <select class="field-select activitySelect">
            <option value="">Select activity level</option>
            <option value="1.2">Sedentary (little/no exercise)</option>
            <option value="1.375">Lightly Active (1–3 days/week)</option>
            <option value="1.55">Moderately Active (3–5 days/week)</option>
            <option value="1.725">Very Active (6–7 days/week)</option>
          </select>
        </div>
      </div>
      <p id="formError" class="form-error"></p>
      <button class="primary-btn" onclick="calculate()">CALCULATE HEALTH INDEX</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
<script src="/pwa.js"></script>
</body>
</html>
