<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sarx — Health Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/icon.jpg">
  <meta property="og:title" content="Sarx — Know your body.">
  <meta property="og:description" content="Your curated health index. BMI, TDEE, body fat, and goal planning.">
  <meta property="og:image" content="../assets/icon.jpg">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="app">
  <div class="screen active">
    <img class="logo-img" src="../assets/logo.png" alt="Sarx">
    <p class="section-tag" id="status-tag">STATUS • —</p>
    <div class="title-row">
      <h2 class="screen-title">Your Health Index</h2>
      <a class="edit-btn" href="../">Edit</a>
    </div>
    <div class="stats-bar" id="stats-bar"></div>

    <div class="metric-pair">
      <div class="metric-card">
        <span class="metric-label">BMI</span>
        <span class="metric-value" id="val-bmi">--</span>
        <span class="metric-sub" id="bmi-category">--</span>
      </div>
      <div class="metric-card slide-card" id="slide-card">
        <div class="slide-panel" style="transform:translateX(0)">
          <span class="metric-label">TDEE</span>
          <span class="metric-value" id="val-tdee">--</span>
          <span class="metric-sub">kcal / day</span>
        </div>
        <div class="slide-panel" style="transform:translateX(100%)">
          <span class="metric-label">BMR</span>
          <span class="metric-value" id="val-bmr">--</span>
          <span class="metric-sub">Burnt a day</span>
        </div>
        <div class="slide-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <div class="metric-card full">
      <span class="metric-label">BODY FAT PERCENTAGE</span>
      <span class="metric-value-lg" id="val-bodyfat">--</span>
      <div class="gbar-wrap">
        <div class="gbar bf-gradient">
          <div class="gbar-dot" id="bf-dot"></div>
        </div>
        <div class="gbar-labels">
          <span>Athletic</span><span>Average</span><span>Obese</span>
        </div>
      </div>
    </div>

    <div class="metric-card full">
      <span class="metric-label">WEIGHT</span>
      <span class="metric-value-lg" id="val-weight">--</span>
      <div class="gbar-wrap">
        <div class="gbar weight-gradient">
          <div class="gbar-dot" id="weight-dot"></div>
        </div>
        <div class="gbar-labels">
          <span>Low</span><span>Average</span><span>Slightly High</span><span>High</span>
        </div>
      </div>
    </div>

    <button class="primary-btn" onclick="location.href='../objective/'">CALCULATE OBJECTIVE</button>
  </div>

  <nav class="tab-bar">
    <button class="tab-item active" onclick="location.href='./'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <rect x="3" y="13" width="4" height="8" rx="1"/>
        <rect x="10" y="8" width="4" height="13" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Index</span>
    </button>
    <button class="tab-item" onclick="location.href='../objective/'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
      </svg>
      <span>Objective</span>
    </button>
    <button class="tab-item" onclick="location.href='../learning/'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12 3 4 7v13l8-4 8 4V7L12 3zm6 17-6-3-6 3V8.5l6-3 6 3V20z"/>
      </svg>
      <span>Learn</span>
    </button>
  </nav>
</div>
<script>
  (function () {
    var bmi      = localStorage.getItem("bm_bmi");
    var bmiCat   = localStorage.getItem("bm_bmiCat");
    var tdee     = localStorage.getItem("bm_tdee");
    var bodyFat  = localStorage.getItem("bm_bodyfat");
    var weight   = localStorage.getItem("bm_weight");
    var sex      = localStorage.getItem("bm_sex");
    var age      = localStorage.getItem("bm_age");
    var heightFt = localStorage.getItem("bm_heightFt");
    var heightIn = localStorage.getItem("bm_heightIn");
    var activity = localStorage.getItem("bm_activity");
    var idealMin = parseFloat(localStorage.getItem("bm_idealMin"));
    var idealMax = parseFloat(localStorage.getItem("bm_idealMax"));
    var status   = localStorage.getItem("bm_status");

    if (!bmi) { window.location.href = "../"; return; }

    var bmr     = localStorage.getItem("bm_bmr");

    document.getElementById("status-tag").textContent = "STATUS • " + (status || "—");
    document.getElementById("val-bmi").textContent = bmi;
    document.getElementById("bmi-category").textContent = bmiCat || "--";
    document.getElementById("val-tdee").textContent = parseInt(tdee).toLocaleString();
    document.getElementById("val-bmr").textContent = parseInt(bmr).toLocaleString();
    document.getElementById("val-bodyfat").textContent = bodyFat + "%";
    document.getElementById("val-weight").textContent = weight + " lbs";

    // Stats bar
    var activityLabels = {
      "1.2": "Sedentary", "1.375": "Lightly Active",
      "1.55": "Moderately Active", "1.725": "Very Active"
    };
    var stats = [
      { label: "AGE",      value: age },
      { label: "HEIGHT",   value: heightFt + "'" + heightIn + '"' },
      { label: "WEIGHT",   value: weight + " lbs" },
      { label: "SEX",      value: sex === "male" ? "Male" : "Female" },
      { label: "ACTIVITY", value: activityLabels[activity] || activity }
    ];
    document.getElementById("stats-bar").innerHTML = stats.map(function (s) {
      return '<div class="stat-chip"><span class="stat-chip-label">' + s.label +
             '</span><span class="stat-chip-value">' + s.value + '</span></div>';
    }).join("");

    // Gradient bar — body fat
    var maxBf = sex === "male" ? 35 : 45;
    var bfPct = Math.min(95, Math.max(5, (parseFloat(bodyFat) / maxBf) * 100));
    document.getElementById("bf-dot").style.left = bfPct + "%";

    // Gradient bar — weight
    var w = parseFloat(weight);
    var buffer = 25;
    var wPct;
    if (w <= idealMin - buffer) {
      wPct = 5;
    } else if (w <= idealMin) {
      wPct = 5 + ((w - (idealMin - buffer)) / buffer) * 25;
    } else if (w <= idealMax) {
      wPct = 30 + ((w - idealMin) / (idealMax - idealMin)) * 40;
    } else if (w <= idealMax + buffer) {
      wPct = 70 + ((w - idealMax) / buffer) * 20;
    } else {
      wPct = 95;
    }
    document.getElementById("weight-dot").style.left = Math.min(95, Math.max(5, wPct)) + "%";
  })();

  // Slide card
  (function () {
    var card     = document.getElementById("slide-card");
    var panels   = card.querySelectorAll(".slide-panel");
    var dots     = card.querySelectorAll(".dot");
    var current  = 0;
    var startX   = 0;
    var dragging = false;

    function goTo(n) {
      current = Math.max(0, Math.min(n, 1));
      panels[0].style.transform = current === 0 ? "translateX(0)"    : "translateX(-100%)";
      panels[1].style.transform = current === 1 ? "translateX(0)"    : "translateX(100%)";
      dots.forEach(function (d, i) { d.classList.toggle("active", i === current); });
    }

    card.addEventListener("touchstart",  function (e) { startX = e.touches[0].clientX; });
    card.addEventListener("touchend",    function (e) {
      var dx = startX - e.changedTouches[0].clientX;
      if (Math.abs(dx) > 30) goTo(dx > 0 ? current + 1 : current - 1);
    });

    card.addEventListener("mousedown",  function (e) { startX = e.clientX; dragging = true; });
    card.addEventListener("mouseup",    function (e) {
      if (!dragging) return;
      dragging = false;
      var dx = startX - e.clientX;
      if (Math.abs(dx) > 30) goTo(dx > 0 ? current + 1 : current - 1);
    });
    card.addEventListener("mouseleave", function () { dragging = false; });
  })();
</script>
</body>
</html>
