<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Health Index — Your BMI, TDEE &amp; Body Fat | Sarx</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://sarx.app/healthindex/">
  <meta name="description" content="Your personal health index — BMI, TDEE, BMR, and body fat percentage calculated from your metrics.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap"></noscript>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/icon.jpg">
  <link rel="manifest" href="/manifest.json">
  <meta property="og:title" content="Health Index — Sarx">
  <meta property="og:description" content="Your personal BMI, TDEE, BMR, and body fat percentage.">
  <meta property="og:image" content="https://sarx.app/assets/socialImage.png">
  <meta property="og:url" content="https://sarx.app/healthindex/">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="app">
  <div class="screen active">
    <p class="section-tag" id="status-tag">STATUS • —</p>
    <div class="title-row">
      <h1 class="screen-title">Your Health Index</h1>
      <button class="menu-btn" onclick="openMenu()" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="stats-bar" id="stats-bar"></div>

    <div class="metric-pair">
      <div class="metric-card anim-card anim-d1">
        <span class="metric-label">BMI</span>
        <span class="metric-value" id="val-bmi">--</span>
        <span class="metric-sub" id="bmi-category">--</span>
        <div class="bf-ideal-range" style="margin-top: auto; align-items: flex-start; text-align: left;">
          <span class="ideal-label">IDEAL RANGE</span>
          <span class="ideal-value">18.5–24.9</span>
        </div>
      </div>
      <div class="metric-card slide-card anim-card anim-d2" id="slide-card">
        <div class="slide-panel" style="transform:translateX(0)">
          <span class="metric-label">TDEE</span>
          <span class="metric-value" id="val-tdee">--</span>
          <span class="metric-sub">kcal / day</span>
        </div>
        <div class="slide-panel" style="transform:translateX(100%)">
          <span class="metric-label">BMR</span>
          <span class="metric-value" id="val-bmr">--</span>
          <span class="metric-sub">Burnt a day</span>
        </div>
        <div class="slide-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <div class="metric-card full anim-card anim-d3">
      <span class="metric-label">BODY FAT PERCENTAGE</span>
      <div class="metric-value-row">
        <span class="metric-value-lg" id="val-bodyfat">--</span>
        <div class="bf-ideal-range" id="bf-ideal-range"></div>
      </div>
      <div class="gbar-wrap">
        <div class="gbar bf-gradient">
          <div class="gbar-dot" id="bf-dot"></div>
        </div>
        <div class="gbar-labels">
          <span>Athletic</span><span>Healthy</span><span>High</span>
        </div>
      </div>
    </div>

    <div class="metric-card full anim-card anim-d4">
      <span class="metric-label">WEIGHT</span>
      <div class="metric-value-row">
        <span class="metric-value-lg" id="val-weight">--</span>
        <div class="bf-ideal-range" id="weight-ideal-range"></div>
      </div>
      <div class="gbar-wrap">
        <div class="gbar weight-gradient">
          <div class="gbar-dot" id="weight-dot"></div>
        </div>
        <div class="gbar-labels">
          <span>Low</span><span>Healthy</span><span>Slightly High</span><span>High</span>
        </div>
      </div>
    </div>

    <button class="primary-btn" onclick="location.href='../goal/'">CREATE PLAN</button>
  </div>

  <nav class="tab-bar">
    <button class="tab-item active" onclick="location.href='./'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <rect x="3" y="13" width="4" height="8" rx="1"/>
        <rect x="10" y="8" width="4" height="13" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Index</span>
    </button>
    <button class="tab-item" onclick="location.href='../goal/'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
      </svg>
      <span>Plan</span>
    </button>
    <button class="tab-item" onclick="location.href='../learning/'">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22" aria-hidden="true">
        <path d="M12 3 4 7v13l8-4 8 4V7L12 3zm6 17-6-3-6 3V8.5l6-3 6 3V20z"/>
      </svg>
      <span>Learn</span>
    </button>
  </nav>

  <div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
  <div class="menu-drawer" id="menu-drawer">
    <div class="menu-header">
      <img class="menu-logo" src="../assets/logo.png" alt="Sarx">
      <button class="menu-close" onclick="closeMenu()" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <hr class="menu-divider">
    <nav class="menu-nav">
      <div class="menu-item menu-item-soon">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18" aria-hidden="true"><path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/></svg>
        </div>
        Account
        <span class="menu-soon-badge">COMING SOON</span>
      </div>
      <a class="menu-item" href="../?edit">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        Edit Metrics
      </a>
      <a class="menu-item" href="../about/">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="17" height="17" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </div>
        About
      </a>
      <button class="menu-item" onclick="addApp()">
        <div class="menu-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="17" height="17" aria-hidden="true"><path d="M12 2v13m0 0l-4-4m4 4l4-4"/><path d="M3 17v3a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1v-3"/></svg>
        </div>
        Add App
      </button>
    </nav>
    <div class="menu-toast" id="menu-toast"></div>
  </div>
</div>
<script src="healthindex.js"></script>
<script src="../menu.js"></script>
<script src="/pwa.js"></script>
</body>
</html>
